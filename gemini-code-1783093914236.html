<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Me amas?</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffe4e1;
            font-family: Arial, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            width: 400px;
            height: 400px;
        }
        img {
            width: 150px;
            border-radius: 10px;
        }
        h1 {
            color: #333;
        }
        .btn {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            border-radius: 20px;
            cursor: pointer;
            position: absolute;
            transition: all 0.1s ease;
        }
        #yesBtn {
            left: 100px;
            bottom: 50px;
        }
        #noBtn {
            right: 100px;
            bottom: 50px;
        }
        #resultContainer {
            display: none;
            margin-top: 20px;
            font-size: 24px;
            color: #ff4d6d;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container" id="questionContainer">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BwZzZic3V1bTZ0ZndvYnl6NTI5bHBrb3A5bnd0cmM0bW9wZWh0NSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3R9/c76IJLufpNwSULPk77/giphy.gif" alt="Bubu Dudu">
        <h1>Do you love me?</h1>
        
        <button id="yesBtn" class="btn">Yes</button>
        <button id="noBtn" class="btn">No</button>

        <div id="resultContainer">
            ¡Sabía que dirías que sí! ❤️
        </div>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");
        const questionContainer = document.getElementById("questionContainer");
        const resultContainer = document.getElementById("resultContainer");

        // Lógica de la imagen para mover el botón "No"
        noBtn.addEventListener("mouseover", () => {
            const newX = Math.floor(Math.random() * (questionContainer.offsetWidth - noBtn.offsetWidth));
            const newY = Math.floor(Math.random() * (questionContainer.offsetHeight - noBtn.offsetHeight));
            
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        });

        // Al hacer clic en "Sí"
        yesBtn.addEventListener("click", () => {
            // Oculta los botones y muestra el mensaje final
            noBtn.style.display = "none";
            yesBtn.style.display = "none";
            resultContainer.style.display = "block";
        });
    </script>
</body>
</html>
